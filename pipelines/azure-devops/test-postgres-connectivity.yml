# =============================================================================
# Pipeline: Test PostgreSQL Connectivity from EKS Cluster
#
# Purpose:
#   Validates that the TIBCO Control Plane's EKS pods can reach the Aurora
#   PostgreSQL database before running the full CP deployment pipeline.
#   Runs a Kubernetes Job inside the cluster so the connectivity test exercises
#   the same VPC routing, security groups, and network policies that the CP
#   orchestrator will use.
#
# When to run:
#   - Before deploying TIBCO Control Plane for the first time
#   - After changing RDS security groups or VPC routing
#   - After enabling SSL enforcement (rds.force_ssl=1)
#   - To diagnose "CP orchestrator cannot connect to database" errors
#
# Pre-requisites:
#   1. Azure DevOps Variable Group "tibco-platform-eks-secrets" containing:
#        AWS_ACCESS_KEY_ID      (secret)
#        AWS_SECRET_ACCESS_KEY  (secret)
#        AWS_SESSION_TOKEN      (secret, optional — for assumed-role sessions)
#        TP_DB_PASSWORD         (secret)
#
#   2. EKS cluster is running and the pipeline agent can reach the AWS API.
#
#   3. The RDS security group allows inbound TCP on port 5432 from the
#      EKS node security group (or VPC CIDR).
#
# How it works:
#   1. Updates kubeconfig for the target EKS cluster
#   2. Creates a temporary Kubernetes Secret with DB credentials
#   3. Deploys a Kubernetes Job using the postgres:16 image
#      - Stage 1: pg_isready — checks network reachability and DB process
#      - Stage 2: psql SELECT 1 — validates credentials and DB access
#      - Stage 3: SSL handshake test — if sslmode != "disable"
#   4. Streams the Job logs to the pipeline console
#   5. Fails the pipeline if any critical check fails
#   6. Always cleans up (Job + Secret) in the final step
# =============================================================================

trigger: none  # Manual trigger only — not auto-triggered on code push

parameters:
  - name: awsRegion
    displayName: 'AWS Region'
    type: string
    default: 'us-west-2'

  - name: eksClusterName
    displayName: 'EKS Cluster Name'
    type: string
    default: 'eks-cluster-us-west-2'

  - name: dbHost
    displayName: 'PostgreSQL Host (RDS writer endpoint)'
    type: string
    # Example: cluster-id.cluster-xxxx.us-west-2.rds.amazonaws.com

  - name: dbPort
    displayName: 'PostgreSQL Port'
    type: string
    default: '5432'

  - name: dbName
    displayName: 'Database Name'
    type: string
    default: 'postgres'

  - name: dbUsername
    displayName: 'Database Username'
    type: string
    default: 'useradmin'

  - name: dbSslMode
    displayName: 'SSL Mode'
    type: string
    default: 'disable'
    values:
      - disable
      - require
      - verify-full

  - name: testNamespace
    displayName: 'Kubernetes Namespace for test Job'
    type: string
    default: 'kube-system'

  - name: cpInstanceId
    displayName: 'CP Instance ID (used to check namespace existence)'
    type: string
    default: 'cp1'

variables:
  # ---------------------------------------------------------------------------
  # Variable group must be created in Azure DevOps:
  #   Project Settings → Pipelines → Library → + Variable group
  #   Name: tibco-platform-eks-secrets
  # Contains: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN,
  #           TP_DB_PASSWORD
  # ---------------------------------------------------------------------------
  - group: tibco-platform-eks-secrets

  - name: jobName
    value: 'tibco-pg-connectivity-test'
  - name: secretName
    value: 'tibco-pg-test-credentials'

stages:
  - stage: TestPostgresConnectivity
    displayName: 'Test PostgreSQL Connectivity from EKS'
    jobs:
      - job: RunConnectivityTest
        displayName: 'Run PostgreSQL Connectivity Test Job'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 15

        steps:
          - checkout: none

          # ------------------------------------------------------------------
          # Step 1: Set up AWS auth and EKS kubeconfig
          # ------------------------------------------------------------------
          - template: templates/aws-eks-setup-steps.yml
            parameters:
              awsRegion: ${{ parameters.awsRegion }}
              eksClusterName: ${{ parameters.eksClusterName }}
              installHelm: false

          # ------------------------------------------------------------------
          # Step 2: Create a temporary Kubernetes Secret with DB credentials.
          # Storing credentials in a K8s Secret (rather than directly in the
          # Job YAML) ensures the password is never written to disk in plaintext
          # or exposed in kubectl describe output.
          # ------------------------------------------------------------------
          - script: |
              set -euo pipefail

              echo "Creating temporary credentials secret in namespace: ${{ parameters.testNamespace }}"

              kubectl create secret generic "$(secretName)" \
                --namespace "${{ parameters.testNamespace }}" \
                --from-literal=PGPASSWORD="$(TP_DB_PASSWORD)" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Secret '$(secretName)' created/updated."
            displayName: 'Create temporary DB credentials secret'
            env:
              AWS_DEFAULT_REGION: ${{ parameters.awsRegion }}
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
              TP_DB_PASSWORD: $(TP_DB_PASSWORD)

          # ------------------------------------------------------------------
          # Step 3: Deploy the connectivity test Job.
          # The Job runs three checks in sequence:
          #   Check 1 — pg_isready: verifies network path and DB process state
          #   Check 2 — psql SELECT 1: verifies credentials and DB login
          #   Check 3 — psql SHOW ssl: verifies SSL is active (if sslmode != disable)
          # ------------------------------------------------------------------
          - script: |
              set -euo pipefail

              DB_HOST="${{ parameters.dbHost }}"
              DB_PORT="${{ parameters.dbPort }}"
              DB_NAME="${{ parameters.dbName }}"
              DB_USER="${{ parameters.dbUsername }}"
              SSL_MODE="${{ parameters.dbSslMode }}"
              NAMESPACE="${{ parameters.testNamespace }}"
              JOB_NAME="$(jobName)"
              SECRET_NAME="$(secretName)"

              # Delete any existing job from a previous run
              kubectl delete job "${JOB_NAME}" -n "${NAMESPACE}" --ignore-not-found

              echo "Deploying connectivity test Job..."
              echo "  Host:     ${DB_HOST}:${DB_PORT}"
              echo "  Database: ${DB_NAME}"
              echo "  Username: ${DB_USER}"
              echo "  SSL mode: ${SSL_MODE}"
              echo ""

              cat <<EOF | kubectl apply -f -
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: ${JOB_NAME}
                namespace: ${NAMESPACE}
                labels:
                  app: tibco-pg-connectivity-test
                  managed-by: azure-devops-pipeline
              spec:
                backoffLimit: 0
                ttlSecondsAfterFinished: 300
                template:
                  metadata:
                    labels:
                      app: tibco-pg-connectivity-test
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: pg-tester
                        image: postgres:16
                        command: ["/bin/bash", "-c"]
                        args:
                          - |
                            set -euo pipefail

                            RED='\033[0;31m'
                            GREEN='\033[0;32m'
                            YELLOW='\033[1;33m'
                            NC='\033[0m'

                            PASS=0
                            FAIL=0

                            echo "============================================================"
                            echo "TIBCO Platform - PostgreSQL Connectivity Test"
                            echo "Target: ${DB_HOST}:${DB_PORT}/${DB_NAME}"
                            echo "User:   ${DB_USER}"
                            echo "SSL:    ${SSL_MODE}"
                            echo "Date:   \$(date -u)"
                            echo "============================================================"
                            echo ""

                            # --- CHECK 1: pg_isready ---
                            echo "CHECK 1: pg_isready (network + DB process)"
                            if pg_isready \
                                -h "${DB_HOST}" \
                                -p "${DB_PORT}" \
                                -U "${DB_USER}" \
                                -d "${DB_NAME}" \
                                -t 10; then
                              echo -e "\${GREEN}PASS\${NC}: pg_isready — DB is accepting connections"
                              PASS=\$((PASS + 1))
                            else
                              echo -e "\${RED}FAIL\${NC}: pg_isready — DB is NOT reachable"
                              echo "  Troubleshoot:"
                              echo "    1. Check RDS security group allows TCP/5432 from EKS node SG"
                              echo "    2. Check VPC routing / NACL rules"
                              echo "    3. Verify DB host: ${DB_HOST}"
                              FAIL=\$((FAIL + 1))
                            fi
                            echo ""

                            # --- CHECK 2: psql SELECT 1 ---
                            echo "CHECK 2: psql connection + authentication"
                            if psql \
                                "host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME} user=${DB_USER} sslmode=${SSL_MODE}" \
                                -c "SELECT 1 AS connection_test;" \
                                --no-password \
                                -t \
                                --connect-timeout 10 2>&1; then
                              echo -e "\${GREEN}PASS\${NC}: psql SELECT 1 — credentials accepted"
                              PASS=\$((PASS + 1))
                            else
                              echo -e "\${RED}FAIL\${NC}: psql SELECT 1 — authentication failed"
                              echo "  Troubleshoot:"
                              echo "    1. Verify DB_USERNAME and DB_PASSWORD are correct"
                              echo "    2. If SSL mode is 'disable' and rds.force_ssl=1 is set, use 'require'"
                              echo "    3. Check pg_hba.conf on the Aurora cluster allows the EKS VPC CIDR"
                              FAIL=\$((FAIL + 1))
                            fi
                            echo ""

                            # --- CHECK 3: SSL verification (skipped if sslmode=disable) ---
                            if [ "${SSL_MODE}" != "disable" ]; then
                              echo "CHECK 3: SSL connection verification"
                              SSL_STATUS=\$(psql \
                                "host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME} user=${DB_USER} sslmode=${SSL_MODE}" \
                                -c "SHOW ssl;" \
                                --no-password \
                                -t \
                                --connect-timeout 10 2>&1)
                              if echo "\${SSL_STATUS}" | grep -qi "on"; then
                                echo -e "\${GREEN}PASS\${NC}: SSL is active on the connection (sslmode=${SSL_MODE})"
                                PASS=\$((PASS + 1))
                              else
                                echo -e "\${RED}FAIL\${NC}: SSL was not negotiated (sslmode=${SSL_MODE} requested)"
                                echo "  Result: \${SSL_STATUS}"
                                FAIL=\$((FAIL + 1))
                              fi
                              echo ""
                            else
                              echo "CHECK 3: SSL verification — SKIPPED (sslmode=disable)"
                              echo ""
                            fi

                            # --- DB version and basic info ---
                            echo "--- Database Info ---"
                            psql \
                              "host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME} user=${DB_USER} sslmode=${SSL_MODE}" \
                              -c "SELECT version();" \
                              -c "SELECT current_database(), current_user, inet_server_addr(), ssl;" \
                              --no-password \
                              -t \
                              --connect-timeout 10 2>&1 || true
                            echo ""

                            echo "============================================================"
                            echo "RESULTS: \${PASS} passed, \${FAIL} failed"
                            echo "============================================================"

                            if [ \${FAIL} -gt 0 ]; then
                              echo "CONNECTIVITY TEST FAILED — resolve the failures above before deploying TIBCO Control Plane"
                              exit 1
                            else
                              echo "ALL CHECKS PASSED — PostgreSQL is reachable from EKS"
                              echo "Proceed with: pipelines/azure-devops/deploy-tibco-control-plane.yml"
                              exit 0
                            fi
                        env:
                          - name: PGPASSWORD
                            valueFrom:
                              secretKeyRef:
                                name: ${SECRET_NAME}
                                key: PGPASSWORD
                        resources:
                          requests:
                            memory: "64Mi"
                            cpu: "100m"
                          limits:
                            memory: "256Mi"
                            cpu: "500m"
              EOF

              echo "Job '${JOB_NAME}' submitted to namespace '${NAMESPACE}'."
            displayName: 'Deploy PostgreSQL connectivity test Job'
            env:
              AWS_DEFAULT_REGION: ${{ parameters.awsRegion }}
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)

          # ------------------------------------------------------------------
          # Step 4: Wait for the Job to complete, then stream its logs.
          # Timeout: 5 minutes (pg_isready timeout is 10s; psql is 10s;
          # plus pod scheduling time on a loaded cluster).
          # ------------------------------------------------------------------
          - script: |
              set -euo pipefail

              JOB_NAME="$(jobName)"
              NAMESPACE="${{ parameters.testNamespace }}"

              echo "Waiting for Job '${JOB_NAME}' to complete (timeout: 5 minutes)..."
              kubectl wait job/"${JOB_NAME}" \
                --namespace "${NAMESPACE}" \
                --for=condition=complete \
                --timeout=300s || true

              echo ""
              echo "=== Job Status ==="
              kubectl describe job "${JOB_NAME}" -n "${NAMESPACE}" | grep -E "^(Name|Namespace|Status|Completions|Start|Completed|Pods Statuses)"

              echo ""
              echo "=== Job Logs ==="
              POD_NAME=$(kubectl get pods -n "${NAMESPACE}" \
                -l "job-name=${JOB_NAME}" \
                -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

              if [ -n "${POD_NAME}" ]; then
                kubectl logs "${POD_NAME}" -n "${NAMESPACE}" || true
              else
                echo "WARNING: No pod found for job — may have been cleaned up by TTL"
              fi

              echo ""
              echo "=== Determining Exit Code ==="
              JOB_STATUS=$(kubectl get job "${JOB_NAME}" -n "${NAMESPACE}" \
                -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || echo "")
              JOB_FAILED=$(kubectl get job "${JOB_NAME}" -n "${NAMESPACE}" \
                -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "")

              if [ "${JOB_STATUS}" = "True" ]; then
                echo "Job SUCCEEDED — all connectivity checks passed."
                exit 0
              elif [ "${JOB_FAILED}" = "True" ]; then
                echo "Job FAILED — one or more connectivity checks failed."
                echo "Review the logs above and fix before deploying TIBCO Control Plane."
                exit 1
              else
                echo "Job status unknown — check manually: kubectl get job ${JOB_NAME} -n ${NAMESPACE}"
                exit 1
              fi
            displayName: 'Wait for Job and stream logs'
            env:
              AWS_DEFAULT_REGION: ${{ parameters.awsRegion }}
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)

          # ------------------------------------------------------------------
          # Step 5: Clean up — delete the test Job and credentials Secret.
          # This step always runs (condition: always()) to avoid leaving
          # test resources in the cluster after the pipeline completes.
          # ------------------------------------------------------------------
          - script: |
              NAMESPACE="${{ parameters.testNamespace }}"
              JOB_NAME="$(jobName)"
              SECRET_NAME="$(secretName)"

              echo "Cleaning up test resources..."
              kubectl delete job "${JOB_NAME}" -n "${NAMESPACE}" --ignore-not-found
              kubectl delete secret "${SECRET_NAME}" -n "${NAMESPACE}" --ignore-not-found
              echo "Cleanup complete."
            displayName: 'Clean up test Job and credentials secret'
            condition: always()
            env:
              AWS_DEFAULT_REGION: ${{ parameters.awsRegion }}
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
